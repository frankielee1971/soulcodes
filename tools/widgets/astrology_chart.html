<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrology Chart - SoulCodes</title>
    <style>
        .astrology-widget {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(251, 191, 36, 0.1));
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: white;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(15px);
        }
        
        .astrology-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .astrology-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #FBB936;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .time-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 20px;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        
        .results-container {
            margin-top: 30px;
            display: none;
        }
        
        .big-three {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .sign-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .sign-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
        
        .sign-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.5));
        }
        
        .sign-type {
            font-size: 1rem;
            color: #FBB936;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .sign-name {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .sign-dates {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }
        
        .sign-element {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .sign-meaning {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        .detailed-reading {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            padding: 25px;
        }
        
        .reading-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #FBB936;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .reading-section {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            border-left: 4px solid #FBB936;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #FBB936;
            margin-bottom: 10px;
        }
        
        .section-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.7;
        }
        
        .compatibility-note {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        
        .compatibility-title {
            font-weight: 600;
            color: #FBB936;
            margin-bottom: 8px;
        }
        
        .compatibility-content {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .time-row {
                grid-template-columns: 1fr;
            }
            
            .big-three {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="astrology-widget">
        <h1 class="astrology-title">⭐ Astrology Chart</h1>
        <p class="astrology-subtitle">Discover your cosmic blueprint through the stars</p>
        
        <form id="astrologyForm">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Date of Birth</label>
                <div class="form-row">
                    <input type="number" id="day" class="form-input" placeholder="Day" min="1" max="31" required>
                    <input type="number" id="month" class="form-input" placeholder="Month" min="1" max="12" required>
                    <input type="number" id="year" class="form-input" placeholder="Year" min="1900" max="2030" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Time of Birth (24-hour format)</label>
                <div class="time-row">
                    <input type="number" id="hour" class="form-input" placeholder="Hour (0-23)" min="0" max="23" required>
                    <input type="number" id="minute" class="form-input" placeholder="Minute (0-59)" min="0" max="59" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="birthplace">Place of Birth</label>
                <input type="text" id="birthplace" class="form-input" placeholder="City, Country" required>
            </div>
            
            <button type="submit" class="calculate-btn">⭐ Generate My Astrology Chart</button>
        </form>
        
        <div id="results" class="results-container">
            <div class="big-three" id="bigThree">
                <!-- Sign cards will be inserted here -->
            </div>
            
            <div class="detailed-reading">
                <h3 class="reading-title">Your Complete Astrological Profile</h3>
                <div id="detailedReading">
                    <!-- Detailed reading will be inserted here -->
                </div>
                
                <div class="compatibility-note">
                    <div class="compatibility-title">Cosmic Harmony</div>
                    <div class="compatibility-content" id="compatibilityNote">
                        Your unique combination of signs creates a special cosmic signature...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const zodiacSigns = {
            "Aries": {
                icon: "♈",
                element: "Fire",
                dates: "Mar 21 - Apr 19",
                traits: ["Bold", "Energetic", "Pioneering"],
                sunMeaning: "You are bold, pioneering, and full of energy. You lead with courage and enthusiasm, always ready to start new adventures.",
                moonMeaning: "Your emotions are fiery and direct. You react quickly and need independence in your emotional life.",
                risingMeaning: "You appear confident, energetic, and ready for action. Others see you as a natural leader and pioneer."
            },
            "Taurus": {
                icon: "♉",
                element: "Earth",
                dates: "Apr 20 - May 20",
                traits: ["Stable", "Practical", "Sensual"],
                sunMeaning: "You are stable, practical, and appreciate beauty. You build lasting foundations and value security and comfort.",
                moonMeaning: "Your emotions are stable and grounded. You need security and comfort to feel emotionally safe.",
                risingMeaning: "You appear calm, reliable, and grounded. Others see you as stable and trustworthy."
            },
            "Gemini": {
                icon: "♊",
                element: "Air",
                dates: "May 21 - Jun 20",
                traits: ["Curious", "Communicative", "Adaptable"],
                sunMeaning: "You are curious, communicative, and adaptable. You thrive on variety, learning, and connecting with others.",
                moonMeaning: "Your emotions are changeable and curious. You need mental stimulation and variety in your emotional experiences.",
                risingMeaning: "You appear curious, talkative, and adaptable. Others see you as intelligent and socially engaging."
            },
            "Cancer": {
                icon: "♋",
                element: "Water",
                dates: "Jun 21 - Jul 22",
                traits: ["Nurturing", "Intuitive", "Protective"],
                sunMeaning: "You are nurturing, intuitive, and emotionally deep. You care deeply for others and value family and home.",
                moonMeaning: "Your emotions are deep and nurturing. You need emotional security and strong family connections.",
                risingMeaning: "You appear caring, protective, and intuitive. Others see you as nurturing and emotionally sensitive."
            },
            "Leo": {
                icon: "♌",
                element: "Fire",
                dates: "Jul 23 - Aug 22",
                traits: ["Confident", "Creative", "Generous"],
                sunMeaning: "You are confident, creative, and generous. You shine brightly and inspire others with your warmth and charisma.",
                moonMeaning: "Your emotions are dramatic and warm. You need appreciation and creative expression to feel fulfilled.",
                risingMeaning: "You appear confident, dramatic, and warm. Others see you as charismatic and naturally creative."
            },
            "Virgo": {
                icon: "♍",
                element: "Earth",
                dates: "Aug 23 - Sep 22",
                traits: ["Analytical", "Helpful", "Perfectionist"],
                sunMeaning: "You are analytical, helpful, and detail-oriented. You serve others with precision and strive for perfection.",
                moonMeaning: "Your emotions are practical and analytical. You need order and usefulness to feel emotionally balanced.",
                risingMeaning: "You appear organized, helpful, and detail-oriented. Others see you as practical and reliable."
            },
            "Libra": {
                icon: "♎",
                element: "Air",
                dates: "Sep 23 - Oct 22",
                traits: ["Diplomatic", "Artistic", "Harmonious"],
                sunMeaning: "You are diplomatic, artistic, and seek harmony. You bring balance to relationships and appreciate beauty.",
                moonMeaning: "Your emotions seek harmony and beauty. You need partnership and balance in your emotional life.",
                risingMeaning: "You appear charming, diplomatic, and balanced. Others see you as harmonious and fair-minded."
            },
            "Scorpio": {
                icon: "♏",
                element: "Water",
                dates: "Oct 23 - Nov 21",
                traits: ["Intense", "Transformative", "Mysterious"],
                sunMeaning: "You are intense, transformative, and deeply intuitive. You see beneath the surface and embrace change.",
                moonMeaning: "Your emotions are intense and transformative. You need depth and authenticity in all emotional connections.",
                risingMeaning: "You appear intense, mysterious, and powerful. Others see you as magnetic and emotionally deep."
            },
            "Sagittarius": {
                icon: "♐",
                element: "Fire",
                dates: "Nov 22 - Dec 21",
                traits: ["Adventurous", "Philosophical", "Optimistic"],
                sunMeaning: "You are adventurous, philosophical, and optimistic. You seek truth, meaning, and new experiences.",
                moonMeaning: "Your emotions are optimistic and adventurous. You need freedom and meaning in your emotional experiences.",
                risingMeaning: "You appear optimistic, adventurous, and philosophical. Others see you as inspiring and freedom-loving."
            },
            "Capricorn": {
                icon: "♑",
                element: "Earth",
                dates: "Dec 22 - Jan 19",
                traits: ["Ambitious", "Disciplined", "Practical"],
                sunMeaning: "You are ambitious, disciplined, and practical. You achieve your goals through persistence and hard work.",
                moonMeaning: "Your emotions are controlled and ambitious. You need achievement and respect to feel emotionally secure.",
                risingMeaning: "You appear serious, ambitious, and responsible. Others see you as competent and mature."
            },
            "Aquarius": {
                icon: "♒",
                element: "Air",
                dates: "Jan 20 - Feb 18",
                traits: ["Innovative", "Humanitarian", "Independent"],
                sunMeaning: "You are innovative, humanitarian, and independent. You envision a better future and value freedom.",
                moonMeaning: "Your emotions are detached and humanitarian. You need independence and innovation in your emotional expression.",
                risingMeaning: "You appear unique, friendly, and innovative. Others see you as progressive and independent."
            },
            "Pisces": {
                icon: "♓",
                element: "Water",
                dates: "Feb 19 - Mar 20",
                traits: ["Compassionate", "Intuitive", "Artistic"],
                sunMeaning: "You are compassionate, intuitive, and artistic. You connect with the spiritual realm and help others heal.",
                moonMeaning: "Your emotions are compassionate and intuitive. You need spiritual connection and creative expression.",
                risingMeaning: "You appear gentle, intuitive, and artistic. Others see you as compassionate and spiritually connected."
            }
        };

        document.getElementById('astrologyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            calculateAstrology();
        });

        function calculateAstrology() {
            const name = document.getElementById('name').value;
            const day = parseInt(document.getElementById('day').value);
            const month = parseInt(document.getElementById('month').value);
            const year = parseInt(document.getElementById('year').value);
            const hour = parseInt(document.getElementById('hour').value);
            const minute = parseInt(document.getElementById('minute').value);
            const birthplace = document.getElementById('birthplace').value;

            if (!name || !day || !month || !year || hour === null || minute === null || !birthplace) {
                alert('Please fill in all fields');
                return;
            }

            const birthDate = new Date(year, month - 1, day);
            const chart = generateAstrologyChart(name, birthDate, hour, minute, birthplace);
            
            displayAstrologyChart(chart);
        }

        function calculateSunSign(birthDate) {
            const month = birthDate.getMonth() + 1;
            const day = birthDate.getDate();

            if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "Aries";
            if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "Taurus";
            if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "Gemini";
            if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "Cancer";
            if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "Leo";
            if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "Virgo";
            if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "Libra";
            if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "Scorpio";
            if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "Sagittarius";
            if ((month == 12 && day >= 22) || (month == 1 && day <= 19)) return "Capricorn";
            if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "Aquarius";
            if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "Pisces";
            
            return "Capricorn"; // fallback
        }

        function generateAstrologyChart(name, birthDate, hour, minute, birthplace) {
            // Calculate Sun sign
            const sunSign = calculateSunSign(birthDate);
            
            // Simplified Moon sign calculation (in reality, this requires ephemeris data)
            const dayOfYear = Math.floor((birthDate - new Date(birthDate.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const moonSignIndex = Math.floor((dayOfYear + birthDate.getFullYear()) / 30) % 12;
            const moonSignNames = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];
            const moonSign = moonSignNames[moonSignIndex];
            
            // Simplified Rising sign calculation (in reality, this requires time and location)
            const risingSignIndex = Math.floor((hour * 2 + minute / 30) / 4) % 12;
            const risingSign = moonSignNames[risingSignIndex];

            return {
                name,
                birthDate,
                hour,
                minute,
                birthplace,
                sunSign,
                moonSign,
                risingSign
            };
        }

        function displayAstrologyChart(chart) {
            document.getElementById('results').style.display = 'block';

            // Create the big three cards
            const bigThree = document.getElementById('bigThree');
            bigThree.innerHTML = '';

            const signs = [
                { type: "Sun Sign", sign: chart.sunSign, description: "Your Core Identity" },
                { type: "Moon Sign", sign: chart.moonSign, description: "Your Emotional Nature" },
                { type: "Rising Sign", sign: chart.risingSign, description: "Your Outer Personality" }
            ];

            signs.forEach(signInfo => {
                const signData = zodiacSigns[signInfo.sign];
                const card = document.createElement('div');
                card.className = 'sign-card';
                card.innerHTML = `
                    <div class="sign-icon">${signData.icon}</div>
                    <div class="sign-type">${signInfo.type}</div>
                    <div class="sign-name">${signInfo.sign}</div>
                    <div class="sign-dates">${signData.dates}</div>
                    <div class="sign-element">${signData.element}</div>
                    <div class="sign-meaning">${signInfo.description}</div>
                `;
                bigThree.appendChild(card);
            });

            // Create detailed reading
            const detailedReading = document.getElementById('detailedReading');
            detailedReading.innerHTML = `
                <div class="reading-section">
                    <div class="section-title">${chart.sunSign} Sun - Your Core Identity</div>
                    <div class="section-content">${zodiacSigns[chart.sunSign].sunMeaning}</div>
                </div>
                
                <div class="reading-section">
                    <div class="section-title">${chart.moonSign} Moon - Your Emotional Nature</div>
                    <div class="section-content">${zodiacSigns[chart.moonSign].moonMeaning}</div>
                </div>
                
                <div class="reading-section">
                    <div class="section-title">${chart.risingSign} Rising - Your Outer Personality</div>
                    <div class="section-content">${zodiacSigns[chart.risingSign].risingMeaning}</div>
                </div>
            `;

            // Create compatibility note
            const compatibilityNote = document.getElementById('compatibilityNote');
            compatibilityNote.textContent = generateCompatibilityNote(chart.sunSign, chart.moonSign, chart.risingSign);

            // Scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function generateCompatibilityNote(sunSign, moonSign, risingSign) {
            const sunElement = zodiacSigns[sunSign].element;
            const moonElement = zodiacSigns[moonSign].element;
            const risingElement = zodiacSigns[risingSign].element;

            let note = `Your ${sunElement} Sun, ${moonElement} Moon, and ${risingElement} Rising create a unique cosmic blend. `;

            if (sunElement === moonElement) {
                note += `Your Sun and Moon share the same element, creating harmony between your identity and emotions. `;
            }

            if (sunElement === risingElement) {
                note += `Your Sun and Rising share the same element, making your outer personality align well with your core identity. `;
            }

            if (moonElement === risingElement) {
                note += `Your Moon and Rising share the same element, creating consistency between your emotions and how others perceive you. `;
            }

            note += `This combination gives you a special ability to understand both yourself and others on multiple levels.`;

            return note;
        }
    </script>
</body>
</html>

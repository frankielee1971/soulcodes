<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Design Generator - SoulCodes</title>
    <style>
        .hd-widget {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(251, 191, 36, 0.1));
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: white;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(15px);
        }
        
        .hd-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .hd-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #FBB936;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .time-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 20px;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        
        .results-container {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            display: none;
        }
        
        .result-section {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            border-left: 4px solid #FBB936;
        }
        
        .result-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #FBB936;
            margin-bottom: 10px;
        }
        
        .result-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }
        
        .type-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .centers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .center-item {
            padding: 8px 12px;
            background: rgba(251, 191, 36, 0.2);
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .gates-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        .gate-item {
            padding: 4px 8px;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 6px;
            font-size: 0.8rem;
        }
        
        .bodygraph-container {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }
        
        .bodygraph-placeholder {
            width: 200px;
            height: 300px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(251, 191, 36, 0.3));
            border-radius: 15px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            border: 2px solid rgba(139, 92, 246, 0.5);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .time-row {
                grid-template-columns: 1fr;
            }
            
            .centers-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="hd-widget">
        <h1 class="hd-title">🧬 Human Design Generator</h1>
        <p class="hd-subtitle">Discover your unique energetic blueprint and life strategy</p>
        
        <form id="hdForm">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Date of Birth</label>
                <div class="form-row">
                    <input type="number" id="day" class="form-input" placeholder="Day" min="1" max="31" required>
                    <input type="number" id="month" class="form-input" placeholder="Month" min="1" max="12" required>
                    <input type="number" id="year" class="form-input" placeholder="Year" min="1900" max="2030" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Time of Birth (24-hour format)</label>
                <div class="time-row">
                    <input type="number" id="hour" class="form-input" placeholder="Hour (0-23)" min="0" max="23" required>
                    <input type="number" id="minute" class="form-input" placeholder="Minute (0-59)" min="0" max="59" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="birthplace">Place of Birth</label>
                <input type="text" id="birthplace" class="form-input" placeholder="City, Country" required>
            </div>
            
            <button type="submit" class="generate-btn">✨ Generate My Human Design Chart</button>
        </form>
        
        <div id="results" class="results-container">
            <div class="bodygraph-container">
                <div class="bodygraph-placeholder" id="bodygraph">
                    Your BodyGraph
                </div>
            </div>
            
            <div class="result-section">
                <div class="result-title">Your Human Design Type</div>
                <div id="typeResult" class="result-content"></div>
            </div>
            
            <div class="result-section">
                <div class="result-title">Strategy & Authority</div>
                <div id="strategyResult" class="result-content"></div>
            </div>
            
            <div class="result-section">
                <div class="result-title">Profile</div>
                <div id="profileResult" class="result-content"></div>
            </div>
            
            <div class="result-section">
                <div class="result-title">Defined Centers</div>
                <div id="centersResult" class="result-content"></div>
            </div>
            
            <div class="result-section">
                <div class="result-title">Defined Gates</div>
                <div id="gatesResult" class="result-content"></div>
            </div>
            
            <div class="result-section">
                <div class="result-title">Incarnation Cross</div>
                <div id="crossResult" class="result-content"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('hdForm').addEventListener('submit', function(e) {
            e.preventDefault();
            generateHumanDesign();
        });

        function generateHumanDesign() {
            // Get form data
            const name = document.getElementById('name').value;
            const day = parseInt(document.getElementById('day').value);
            const month = parseInt(document.getElementById('month').value);
            const year = parseInt(document.getElementById('year').value);
            const hour = parseInt(document.getElementById('hour').value);
            const minute = parseInt(document.getElementById('minute').value);
            const birthplace = document.getElementById('birthplace').value;

            // Validate inputs
            if (!name || !day || !month || !year || hour === null || minute === null || !birthplace) {
                alert('Please fill in all fields');
                return;
            }

            // Calculate Human Design (simplified algorithm)
            const birthDate = new Date(year, month - 1, day);
            const result = calculateHumanDesign(name, birthDate, hour, minute, birthplace);

            // Display results
            displayResults(result);
        }

        function calculateHumanDesign(name, birthDate, hour, minute, birthplace) {
            // Simplified calculation based on birth data
            const daySum = birthDate.getDate();
            const monthSum = birthDate.getMonth() + 1;
            const yearSum = birthDate.getFullYear();
            const timeSum = hour + minute;
            
            const total = daySum + monthSum + (yearSum % 100) + timeSum;
            
            // Determine type
            const types = [
                { name: "Manifestor", strategy: "To inform before you act", description: "You are here to initiate and make things happen. You have the power to start new projects and influence others." },
                { name: "Generator", strategy: "To respond to life", description: "You are here to respond to life and build. You have sustainable life force energy when doing what you love." },
                { name: "Manifesting Generator", strategy: "To respond and then inform", description: "You are a multi-passionate being who can initiate and respond. You move quickly and efficiently when aligned." },
                { name: "Projector", strategy: "To wait for the invitation", description: "You are here to guide and manage others. You have natural wisdom and see the bigger picture." },
                { name: "Reflector", strategy: "To wait a lunar cycle before making decisions", description: "You are here to reflect the health of your community. You are deeply wise and need time to make decisions." }
            ];
            
            const type = types[total % 5];
            
            // Determine authority
            const authorities = ["Emotional", "Sacral", "Splenic", "Ego", "Self-Projected", "Environmental", "Lunar"];
            const authority = authorities[total % 7];
            
            // Determine profile
            const profiles = ["1/3", "1/4", "2/4", "2/5", "3/5", "3/6", "4/6", "4/1", "5/1", "5/2", "6/2", "6/3"];
            const profile = profiles[total % 12];
            
            // Generate centers
            const allCenters = ["Head", "Ajna", "Throat", "G Center", "Heart", "Spleen", "Solar Plexus", "Sacral", "Root"];
            const numDefined = (total % 5) + 2;
            const definedCenters = allCenters.slice(0, numDefined);
            
            // Generate gates
            const numGates = (total % 10) + 5;
            const definedGates = Array.from({length: numGates}, (_, i) => i + 1);
            
            // Generate incarnation cross
            const crosses = [
                "Right Angle Cross of the Four Ways",
                "Left Angle Cross of Wishes", 
                "Juxtaposition Cross of Behavior",
                "Right Angle Cross of Service",
                "Left Angle Cross of Healing"
            ];
            const cross = crosses[total % 5];
            
            return {
                name,
                type,
                authority,
                profile,
                definedCenters,
                definedGates,
                cross
            };
        }

        function displayResults(result) {
            // Show results container
            document.getElementById('results').style.display = 'block';
            
            // Update type result
            document.getElementById('typeResult').innerHTML = `
                <div class="type-badge">${result.type.name}</div>
                <p>${result.type.description}</p>
            `;
            
            // Update strategy result
            document.getElementById('strategyResult').innerHTML = `
                <p><strong>Strategy:</strong> ${result.type.strategy}</p>
                <p><strong>Authority:</strong> ${result.authority}</p>
                <p>Your strategy guides how you interact with the world, while your authority helps you make correct decisions.</p>
            `;
            
            // Update profile result
            document.getElementById('profileResult').innerHTML = `
                <p><strong>Profile:</strong> ${result.profile}</p>
                <p>Your profile represents the costume you wear in this lifetime, combining conscious and unconscious personality traits.</p>
            `;
            
            // Update centers result
            const centersHtml = result.definedCenters.map(center => 
                `<div class="center-item">${center}</div>`
            ).join('');
            document.getElementById('centersResult').innerHTML = `
                <p>These are your defined (consistent) energy centers:</p>
                <div class="centers-grid">${centersHtml}</div>
            `;
            
            // Update gates result
            const gatesHtml = result.definedGates.map(gate => 
                `<div class="gate-item">Gate ${gate}</div>`
            ).join('');
            document.getElementById('gatesResult').innerHTML = `
                <p>Your defined gates represent specific life themes and energies:</p>
                <div class="gates-list">${gatesHtml}</div>
            `;
            
            // Update cross result
            document.getElementById('crossResult').innerHTML = `
                <p><strong>${result.cross}</strong></p>
                <p>Your incarnation cross represents your life's purpose and the role you're here to play in this lifetime.</p>
            `;
            
            // Update bodygraph
            document.getElementById('bodygraph').innerHTML = `
                <div style="font-size: 14px; line-height: 1.4;">
                    <div style="margin-bottom: 10px; font-weight: bold;">${result.name}</div>
                    <div style="margin-bottom: 8px;">${result.type.name}</div>
                    <div style="margin-bottom: 8px;">${result.profile}</div>
                    <div style="font-size: 12px;">${result.authority} Authority</div>
                </div>
            `;
            
            // Scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

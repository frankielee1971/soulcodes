<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerology Calculator - SoulCodes</title>
    <style>
        .numerology-widget {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(251, 191, 36, 0.1));
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: white;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(15px);
        }
        
        .numerology-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .numerology-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #FBB936;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 20px;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        
        .results-container {
            margin-top: 30px;
            display: none;
        }
        
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .number-card {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .number-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
        
        .number-value {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #8B5CF6, #FBB936);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .number-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #FBB936;
            margin-bottom: 15px;
        }
        
        .number-meaning {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        .detailed-reading {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .reading-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #FBB936;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .reading-section {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 10px;
            border-left: 4px solid #FBB936;
        }
        
        .section-title {
            font-weight: 600;
            color: #FBB936;
            margin-bottom: 8px;
        }
        
        .section-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }
        
        .master-number {
            background: linear-gradient(135deg, #FBB936, #8B5CF6);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .numbers-grid {
                grid-template-columns: 1fr;
            }
            
            .number-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="numerology-widget">
        <h1 class="numerology-title">🔢 Numerology Calculator</h1>
        <p class="numerology-subtitle">Unlock the secrets of your numbers and discover your life's blueprint</p>
        
        <form id="numerologyForm">
            <div class="form-group">
                <label class="form-label" for="fullName">Full Name at Birth</label>
                <input type="text" id="fullName" class="form-input" placeholder="Enter your full birth name" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Date of Birth</label>
                <div class="form-row">
                    <input type="number" id="day" class="form-input" placeholder="Day" min="1" max="31" required>
                    <input type="number" id="month" class="form-input" placeholder="Month" min="1" max="12" required>
                    <input type="number" id="year" class="form-input" placeholder="Year" min="1900" max="2030" required>
                </div>
            </div>
            
            <button type="submit" class="calculate-btn">✨ Calculate My Numbers</button>
        </form>
        
        <div id="results" class="results-container">
            <div class="numbers-grid" id="numbersGrid">
                <!-- Number cards will be inserted here -->
            </div>
            
            <div class="detailed-reading">
                <h3 class="reading-title">Your Complete Numerology Reading</h3>
                <div id="detailedReading">
                    <!-- Detailed reading will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Numerology letter values (Pythagorean system)
        const letterValues = {
            'A': 1, 'B': 2, 'C': 3, 'D': 4, 'E': 5, 'F': 6, 'G': 7, 'H': 8, 'I': 9,
            'J': 1, 'K': 2, 'L': 3, 'M': 4, 'N': 5, 'O': 6, 'P': 7, 'Q': 8, 'R': 9,
            'S': 1, 'T': 2, 'U': 3, 'V': 4, 'W': 5, 'X': 6, 'Y': 7, 'Z': 8
        };

        document.getElementById('numerologyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            calculateNumerology();
        });

        function calculateNumerology() {
            const fullName = document.getElementById('fullName').value.trim();
            const day = parseInt(document.getElementById('day').value);
            const month = parseInt(document.getElementById('month').value);
            const year = parseInt(document.getElementById('year').value);

            if (!fullName || !day || !month || !year) {
                alert('Please fill in all fields');
                return;
            }

            const birthDate = new Date(year, month - 1, day);
            const numbers = {
                lifePath: calculateLifePath(day, month, year),
                expression: calculateExpression(fullName),
                soulUrge: calculateSoulUrge(fullName),
                personality: calculatePersonality(fullName),
                birthDay: reduceToPrimary(day)
            };

            displayResults(numbers, fullName, birthDate);
        }

        function calculateLifePath(day, month, year) {
            const total = day + month + year;
            return reduceToPrimary(total);
        }

        function calculateExpression(name) {
            let total = 0;
            for (let char of name.toUpperCase()) {
                if (letterValues[char]) {
                    total += letterValues[char];
                }
            }
            return reduceToPrimary(total);
        }

        function calculateSoulUrge(name) {
            const vowels = 'AEIOU';
            let total = 0;
            for (let char of name.toUpperCase()) {
                if (vowels.includes(char) && letterValues[char]) {
                    total += letterValues[char];
                }
            }
            return reduceToPrimary(total);
        }

        function calculatePersonality(name) {
            const vowels = 'AEIOU';
            let total = 0;
            for (let char of name.toUpperCase()) {
                if (!vowels.includes(char) && letterValues[char]) {
                    total += letterValues[char];
                }
            }
            return reduceToPrimary(total);
        }

        function reduceToPrimary(number) {
            while (number > 9 && number !== 11 && number !== 22 && number !== 33) {
                number = number.toString().split('').reduce((sum, digit) => sum + parseInt(digit), 0);
            }
            return number;
        }

        function displayResults(numbers, name, birthDate) {
            document.getElementById('results').style.display = 'block';

            // Create number cards
            const numbersGrid = document.getElementById('numbersGrid');
            numbersGrid.innerHTML = '';

            const numberCards = [
                {
                    value: numbers.lifePath,
                    name: 'Life Path',
                    meaning: getLifePathMeaning(numbers.lifePath)
                },
                {
                    value: numbers.expression,
                    name: 'Expression',
                    meaning: getExpressionMeaning(numbers.expression)
                },
                {
                    value: numbers.soulUrge,
                    name: 'Soul Urge',
                    meaning: getSoulUrgeMeaning(numbers.soulUrge)
                },
                {
                    value: numbers.personality,
                    name: 'Personality',
                    meaning: getPersonalityMeaning(numbers.personality)
                },
                {
                    value: numbers.birthDay,
                    name: 'Birth Day',
                    meaning: getBirthDayMeaning(numbers.birthDay)
                }
            ];

            numberCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'number-card';
                cardElement.innerHTML = `
                    <div class="number-value">
                        ${card.value}
                        ${[11, 22, 33].includes(card.value) ? '<span class="master-number">Master</span>' : ''}
                    </div>
                    <div class="number-name">${card.name}</div>
                    <div class="number-meaning">${card.meaning}</div>
                `;
                numbersGrid.appendChild(cardElement);
            });

            // Create detailed reading
            const detailedReading = document.getElementById('detailedReading');
            detailedReading.innerHTML = `
                <div class="reading-section">
                    <div class="section-title">Life Path ${numbers.lifePath} - Your Life's Purpose</div>
                    <div class="section-content">${getDetailedLifePathMeaning(numbers.lifePath)}</div>
                </div>
                
                <div class="reading-section">
                    <div class="section-title">Expression ${numbers.expression} - Your Natural Talents</div>
                    <div class="section-content">${getDetailedExpressionMeaning(numbers.expression)}</div>
                </div>
                
                <div class="reading-section">
                    <div class="section-title">Soul Urge ${numbers.soulUrge} - Your Heart's Desire</div>
                    <div class="section-content">${getDetailedSoulUrgeMeaning(numbers.soulUrge)}</div>
                </div>
                
                <div class="reading-section">
                    <div class="section-title">Personality ${numbers.personality} - How Others See You</div>
                    <div class="section-content">${getDetailedPersonalityMeaning(numbers.personality)}</div>
                </div>
                
                <div class="reading-section">
                    <div class="section-title">Birth Day ${numbers.birthDay} - Your Special Gift</div>
                    <div class="section-content">${getDetailedBirthDayMeaning(numbers.birthDay)}</div>
                </div>
            `;

            // Scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        // Meaning functions
        function getLifePathMeaning(number) {
            const meanings = {
                1: "The Leader - Independent, innovative, pioneering",
                2: "The Peacemaker - Cooperative, diplomatic, harmonious",
                3: "The Creative - Artistic, expressive, joyful",
                4: "The Builder - Practical, organized, hardworking",
                5: "The Freedom Seeker - Adventurous, versatile, curious",
                6: "The Nurturer - Caring, responsible, family-oriented",
                7: "The Seeker - Spiritual, analytical, introspective",
                8: "The Achiever - Ambitious, business-minded, powerful",
                9: "The Humanitarian - Compassionate, generous, wise",
                11: "The Intuitive - Inspirational, psychic, enlightened",
                22: "The Master Builder - Visionary, practical idealist",
                33: "The Master Teacher - Compassionate healer, spiritual guide"
            };
            return meanings[number] || "A unique path of self-discovery";
        }

        function getExpressionMeaning(number) {
            const meanings = {
                1: "Leadership and independence",
                2: "Cooperation and diplomacy",
                3: "Creativity and communication",
                4: "Organization and hard work",
                5: "Freedom and adventure",
                6: "Nurturing and responsibility",
                7: "Analysis and spirituality",
                8: "Ambition and material success",
                9: "Humanitarian service",
                11: "Intuition and inspiration",
                22: "Master building and vision",
                33: "Master teaching and healing"
            };
            return meanings[number] || "Unique expression";
        }

        function getSoulUrgeMeaning(number) {
            const meanings = {
                1: "Independence and leadership",
                2: "Peace and cooperation",
                3: "Creative self-expression",
                4: "Security and stability",
                5: "Freedom and variety",
                6: "Love and family harmony",
                7: "Truth and understanding",
                8: "Material success and recognition",
                9: "Universal love and service",
                11: "Spiritual enlightenment",
                22: "Building something lasting",
                33: "Uplifting humanity"
            };
            return meanings[number] || "Deep inner calling";
        }

        function getPersonalityMeaning(number) {
            const meanings = {
                1: "Confident and independent",
                2: "Gentle and cooperative",
                3: "Charming and creative",
                4: "Reliable and practical",
                5: "Dynamic and adventurous",
                6: "Caring and responsible",
                7: "Mysterious and wise",
                8: "Successful and ambitious",
                9: "Compassionate and generous",
                11: "Inspiring and intuitive",
                22: "Visionary and capable",
                33: "Healing and uplifting"
            };
            return meanings[number] || "Unique presence";
        }

        function getBirthDayMeaning(number) {
            const meanings = {
                1: "Natural leadership abilities",
                2: "Diplomatic and cooperative skills",
                3: "Creative and communication talents",
                4: "Organizational and building skills",
                5: "Versatility and adaptability",
                6: "Nurturing and healing abilities",
                7: "Analytical and spiritual gifts",
                8: "Business and material success talents",
                9: "Humanitarian and service abilities",
                11: "Intuitive and inspirational gifts",
                22: "Master building capabilities",
                33: "Master teaching and healing powers"
            };
            return meanings[number] || "Special talents";
        }

        // Detailed meaning functions
        function getDetailedLifePathMeaning(number) {
            const meanings = {
                1: "You are here to be a leader and pioneer. Your path involves developing independence, confidence, and the ability to initiate new projects. You're meant to break new ground and inspire others to follow their own unique paths.",
                2: "You are here to be a peacemaker and diplomat. Your path involves learning cooperation, developing sensitivity to others, and bringing harmony to situations. You excel at working behind the scenes and supporting others.",
                3: "You are here to express creativity and bring joy to the world. Your path involves developing your artistic talents, communication skills, and ability to inspire others. You're meant to spread optimism and beauty.",
                4: "You are here to build solid foundations and create lasting structures. Your path involves developing patience, organization, and practical skills. You're meant to create security and stability for yourself and others.",
                5: "You are here to experience freedom and adventure. Your path involves embracing change, developing versatility, and exploring new horizons. You're meant to break free from limitations and inspire others to do the same.",
                6: "You are here to nurture and serve others. Your path involves developing compassion, taking responsibility for family and community, and creating harmony in relationships. You're a natural healer and counselor.",
                7: "You are here to seek truth and develop spiritual understanding. Your path involves developing intuition, analytical skills, and inner wisdom. You're meant to be a bridge between the material and spiritual worlds.",
                8: "You are here to achieve material success and develop personal power. Your path involves learning to handle money and authority responsibly. You're meant to create abundance and teach others about material mastery.",
                9: "You are here to serve humanity and complete a major life cycle. Your path involves developing universal love, wisdom, and the ability to let go. You're meant to be a humanitarian and spiritual teacher.",
                11: "You are here to inspire others through your intuition and spiritual insight. As a master number, you have the potential for great spiritual leadership and the ability to bring enlightenment to others.",
                22: "You are here to build something of lasting value for humanity. As a master number, you combine practical skills with visionary ideals to create structures that benefit many people.",
                33: "You are here to uplift humanity through compassionate service. As a master number, you have the potential to be a spiritual teacher and healer on a grand scale."
            };
            return meanings[number] || "You have a unique life purpose that involves personal growth and service to others.";
        }

        function getDetailedExpressionMeaning(number) {
            const meanings = {
                1: "You express yourself through leadership, originality, and independence. You have a natural ability to start new projects and inspire others to follow. Your challenge is to develop confidence without becoming too aggressive or self-centered.",
                2: "You express yourself through cooperation, sensitivity, and diplomacy. You have a natural ability to work with others and create harmony. Your challenge is to develop assertiveness without losing your gentle nature.",
                3: "You express yourself through creativity, communication, and joy. You have natural artistic talents and the ability to inspire others. Your challenge is to focus your scattered energies and avoid superficiality.",
                4: "You express yourself through hard work, organization, and practical solutions. You have the ability to build lasting structures and create security. Your challenge is to avoid becoming too rigid or overly focused on details.",
                5: "You express yourself through freedom, versatility, and adventure. You have the ability to adapt to any situation and inspire others to embrace change. Your challenge is to develop focus and avoid restlessness.",
                6: "You express yourself through nurturing, responsibility, and service to others. You have natural healing abilities and create harmony in relationships. Your challenge is to avoid becoming overly controlling or sacrificing yourself.",
                7: "You express yourself through analysis, research, and spiritual seeking. You have the ability to understand complex subjects and see beneath the surface. Your challenge is to share your wisdom without becoming too isolated.",
                8: "You express yourself through ambition, business skills, and material achievement. You have the ability to organize large projects and achieve financial success. Your challenge is to use power responsibly and not become materialistic.",
                9: "You express yourself through humanitarian service and universal love. You have the ability to see the big picture and inspire others to serve humanity. Your challenge is to avoid becoming too idealistic or impractical."
            };
            return meanings[number] || "You have unique talents that allow you to express yourself in meaningful ways.";
        }

        function getDetailedSoulUrgeMeaning(number) {
            const meanings = {
                1: "Your soul craves independence, leadership, and the freedom to make your own decisions. You feel most fulfilled when you're pioneering new territory and inspiring others to follow their own path.",
                2: "Your soul craves peace, cooperation, and harmonious relationships. You feel most fulfilled when you're working with others and creating unity and understanding between people.",
                3: "Your soul craves creative self-expression, joy, and the ability to inspire others. You feel most fulfilled when you're using your artistic talents and bringing beauty and happiness to the world.",
                4: "Your soul craves security, order, and the satisfaction of building something lasting. You feel most fulfilled when you're creating stability and practical solutions for yourself and others.",
                5: "Your soul craves freedom, adventure, and new experiences. You feel most fulfilled when you're exploring new places, ideas, or ways of being, and when you're free from restrictions.",
                6: "Your soul craves love, family harmony, and the opportunity to nurture others. You feel most fulfilled when you're caring for loved ones and creating a beautiful, harmonious environment.",
                7: "Your soul craves truth, wisdom, and spiritual understanding. You feel most fulfilled when you're exploring life's mysteries and developing your inner wisdom and intuitive abilities.",
                8: "Your soul craves material success, recognition, and the power to make a significant impact. You feel most fulfilled when you're achieving your ambitions and building material security.",
                9: "Your soul craves the opportunity to serve humanity and make the world a better place. You feel most fulfilled when you're giving to others and working for the greater good."
            };
            return meanings[number] || "Your soul has deep desires that guide your life choices and bring you fulfillment.";
        }

        function getDetailedPersonalityMeaning(number) {
            const meanings = {
                1: "Others see you as confident, independent, and a natural leader. You project strength and originality, and people look to you for direction and inspiration. You appear self-reliant and pioneering.",
                2: "Others see you as gentle, cooperative, and diplomatic. You project warmth and sensitivity, and people feel comfortable sharing their problems with you. You appear supportive and understanding.",
                3: "Others see you as creative, charming, and entertaining. You project joy and optimism, and people are drawn to your artistic nature and communication skills. You appear inspiring and uplifting.",
                4: "Others see you as reliable, practical, and hardworking. You project stability and competence, and people trust you to get things done. You appear organized and dependable.",
                5: "Others see you as dynamic, adventurous, and freedom-loving. You project excitement and versatility, and people are attracted to your energy and zest for life. You appear progressive and unconventional.",
                6: "Others see you as caring, responsible, and family-oriented. You project nurturing energy and warmth, and people feel safe and cared for in your presence. You appear loving and protective.",
                7: "Others see you as mysterious, intellectual, and spiritually minded. You project depth and wisdom, and people are intrigued by your quiet strength and inner knowledge. You appear thoughtful and profound.",
                8: "Others see you as successful, ambitious, and materially focused. You project power and authority, and people respect your business acumen and ability to achieve goals. You appear competent and influential.",
                9: "Others see you as compassionate, generous, and humanitarian. You project universal love and wisdom, and people are inspired by your selfless service to others. You appear noble and idealistic."
            };
            return meanings[number] || "Others see you as having a unique and memorable presence that leaves a lasting impression.";
        }

        function getDetailedBirthDayMeaning(number) {
            const meanings = {
                1: "You were born with natural leadership abilities and a pioneering spirit. This gift allows you to initiate new projects and inspire others to follow. Use this talent to create positive change in the world.",
                2: "You were born with diplomatic skills and the ability to work well in partnerships. This gift allows you to bring people together and create harmony. Use this talent to heal relationships and build bridges.",
                3: "You were born with creative talents and excellent communication skills. This gift allows you to express yourself artistically and inspire others. Use this talent to bring beauty and joy to the world.",
                4: "You were born with organizational abilities and a strong work ethic. This gift allows you to build lasting structures and create security. Use this talent to create stability for yourself and others.",
                5: "You were born with versatility and a love for freedom and adventure. This gift allows you to adapt to any situation and embrace change. Use this talent to explore new possibilities and inspire others to be free.",
                6: "You were born with nurturing abilities and a strong sense of responsibility. This gift allows you to care for others and create harmony. Use this talent to heal and support those around you.",
                7: "You were born with analytical skills and spiritual insight. This gift allows you to understand complex subjects and see beneath the surface. Use this talent to seek truth and share wisdom.",
                8: "You were born with business acumen and the ability to achieve material success. This gift allows you to organize large projects and build wealth. Use this talent to create abundance and help others prosper.",
                9: "You were born with humanitarian instincts and a desire to serve others. This gift allows you to see the big picture and work for the greater good. Use this talent to make the world a better place."
            };
            return meanings[number] || "You were born with special talents that make you unique and allow you to contribute something valuable to the world.";
        }
    </script>
</body>
</html>
